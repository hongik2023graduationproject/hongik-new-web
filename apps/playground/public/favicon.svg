<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- 다크/라이트 자동 대응: 시스템 컬러 스킴에 맞춰 배경 톤이 바뀐다. -->
  <style>
    .bg { fill: #0a0a0a; }
    .fg { fill: #ffffff; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #1a1a1a; }
      .fg { fill: #ffffff; }
    }
  </style>
  <rect width="32" height="32" rx="6" class="bg"/>
  <!-- 한글 "ㅎ": 위쪽 짧은 가로획 + 중간 가로획 + 아래 원 -->
  <rect x="9" y="6" width="14" height="2.4" rx="1.2" class="fg"/>
  <rect x="6" y="13" width="20" height="2.4" rx="1.2" class="fg"/>
  <circle cx="16" cy="22.5" r="5" fill="none" stroke-width="2.4" stroke="#ffffff"/>
</svg>
