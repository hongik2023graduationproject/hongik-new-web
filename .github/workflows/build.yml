name: Web CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: pnpm 설정
        uses: pnpm/action-setup@v4
        with:
          version: 8.13.0
          run_install: false

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 의존성 설치
        # --frozen-lockfile (기본값) — pnpm-lock.yaml과 package.json 불일치 시 CI 실패.
        # 누구나 로컬에서 의존 추가하면 lockfile도 같이 커밋해야 한다.
        run: pnpm install --frozen-lockfile

      - name: 린트
        run: pnpm lint

      - name: 테스트 실행 (커버리지 포함)
        run: pnpm turbo run test -- --coverage

      - name: 커버리지 요약 생성
        if: always()
        run: |
          echo '## Web 테스트 커버리지 리포트' > coverage-summary.md
          echo '' >> coverage-summary.md
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const r = require('./coverage/coverage-summary.json');
              const t = r.total;
              const fmt = (m) => m.pct + '%';
              console.log('| 항목 | 커버리지 |');
              console.log('|------|----------|');
              console.log('| Statements | ' + fmt(t.statements) + ' |');
              console.log('| Branches | ' + fmt(t.branches) + ' |');
              console.log('| Functions | ' + fmt(t.functions) + ' |');
              console.log('| Lines | ' + fmt(t.lines) + ' |');
            " >> coverage-summary.md
          else
            echo '커버리지 데이터를 찾을 수 없습니다.' >> coverage-summary.md
          fi

      - name: PR에 커버리지 코멘트
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: web-coverage
          path: coverage-summary.md

      - name: 커버리지 리포트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: coverage/

  build-deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: lint-test
    permissions:
      contents: read
      packages: write
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: pnpm 설정
        uses: pnpm/action-setup@v4
        with:
          version: 8.13.0
          run_install: false

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 의존성 설치
        # --frozen-lockfile (기본값) — pnpm-lock.yaml과 package.json 불일치 시 CI 실패.
        # 누구나 로컬에서 의존 추가하면 lockfile도 같이 커밋해야 한다.
        run: pnpm install --frozen-lockfile

      # 플레이그라운드가 브라우저에서 hongik-wasm을 실행하므로,
      # apps/playground/public/에 hong-ik release(`wasm-latest`)의 최신 산출물을 받아온다.
      # 첫 빌드 전 hong-ik의 WASM Publish 워크플로가 1회 이상 실행되어야 한다.
      - name: WASM 산출물 동기화
        run: |
          chmod +x scripts/sync-wasm.sh
          ./scripts/sync-wasm.sh

      - name: Next.js 빌드
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: https://hongik.api.tolelom.xyz

      - name: QEMU 설정
        uses: docker/setup-qemu-action@v3

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker 이미지 빌드 & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hongik-web:latest
            ghcr.io/${{ github.repository_owner }}/hongik-web:main
            ghcr.io/${{ github.repository_owner }}/hongik-web:${{ github.sha }}
          platforms: linux/arm64
